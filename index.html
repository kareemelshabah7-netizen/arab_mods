<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Mods - منصة المودات</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* الألوان الأصلية وتصميم الـ Dark Mode الفخم الخاص بالمنصة */
        :root {
            --background: #0b0f19;
            --surface: #111827;
            --surface-hover: #1f2937;
            --primary: #10b981;
            --primary-hover: #059669;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
        }

        /* شريط التنقل الهيدر الأصلي */
        header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-nav:hover {
            color: var(--text);
            background-color: var(--surface-hover);
        }

        .btn-nav.active {
            color: var(--primary);
            background-color: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* حاوية المحتوى الرئيسي */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* كروت المودات الأصلية للرئيسية */
        .mods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .mod-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .mod-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .mod-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .mod-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }

        .mod-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .btn-download {
            background-color: var(--primary);
            color: #000;
            text-align: center;
            padding: 0.6rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn-download:hover {
            background-color: var(--primary-hover);
        }

        /* تخطيط صفحة الرفع (مقسمة لجزئين مثل الأصلي) */
        .upload-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .upload-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel-box {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        .panel-box h3 {
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }

        /* الفورم المطور */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            background-color: var(--background);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* الجداول والقوائم */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .item-row {
            background-color: var(--background);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .item-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-pending {
            background-color: var(--warning-bg);
            color: var(--warning);
        }

        .badge-approved {
            background-color: var(--success-bg);
            color: var(--success);
        }

        .btn-approve {
            background-color: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .btn-approve:hover {
            background-color: var(--success);
            color: #000;
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i data-lucide="layers"></i>
            <span>Ghost Mods</span>
        </div>
        <div class="nav-buttons">
            <button class="btn-nav active" id="nav-home" onclick="switchPage('home')">
                <i data-lucide="home"></i> الرئيسية
            </button>
            <button class="btn-nav" id="nav-upload" onclick="switchPage('upload')">
                <i data-lucide="upload-cloud"></i> صفحة الرفع والمتابعة
            </button>
        </div>
    </header>

    <main>
        <div id="page-home" class="page active">
            <div class="page-title">
                <i data-lucide="grid" style="color: var(--primary);"></i>
                <span>المودات المعتمدة</span>
            </div>
            <div id="main-mods-grid" class="mods-grid">
                </div>
        </div>

        <div id="page-upload" class="page">
            <div class="page-title">
                <i data-lucide="folder-plus" style="color: var(--primary);"></i>
                <span>منصة إدارة ورفع المودات</span>
            </div>
            
            <div class="upload-layout">
                <div class="panel-box">
                    <h3><i data-lucide="file-plus-2"></i> رفع مود جديد</h3>
                    <form id="upload-form" onsubmit="handleUpload(event)">
                        <div class="form-group">
                            <label>اسم المود التوضيحي</label>
                            <input type="text" id="mod-name" class="form-control" placeholder="أدخل اسم المود هنا..." required>
                        </div>
                        <div class="form-group">
                            <label>وصف المود ومميزاته</label>
                            <textarea id="mod-desc" class="form-control" rows="4" placeholder="شرح مبسط لما يفعله المود..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label>رابط تحميل الملف (صيغة .jar أو Zip)</label>
                            <input type="url" id="mod-link" class="form-control" placeholder="https://example.com/mymod" required>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i data-lucide="send"></i> إرسال المود للمراجعة
                        </button>
                    </form>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    
                    <div class="panel-box">
                        <h3><i data-lucide="clock"></i> متابعة حالة موداتي</h3>
                        <div class="items-list" id="user-mods-list">
                            </div>
                    </div>

                    <div class="panel-box" style="border-color: rgba(16, 185, 129, 0.4);">
                        <h3 style="color: var(--primary);"><i data-lucide="shield-alert"></i> مراجعة الأونر (المعلقين)</h3>
                        <div class="items-list" id="owner-review-list">
                            </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // داتا تجريبية بنفس البنية البرمجية الأصلية
        let modsData = [
            {
                id: 1,
                name: "Sodium Fabric (Intel HD 2500)",
                desc: "تحسين فريمات الأداء المخصص وتخفيف استهلاك كارت الشاشة المدمج بشكل مذهل.",
                link: "#",
                status: "approved"
            },
            {
                id: 2,
                name: "Ghost Pack Core Patch",
                desc: "أكواد الربط الأساسية لمنع الكراش عند التحميل مع تعديل الـ AuthMe.",
                link: "#",
                status: "pending"
            }
        ];

        // تفعيل التنقل الفوري بين الصفحات
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`page-${pageId}`).classList.add('active');
            if(pageId === 'home') document.getElementById('nav-home').classList.add('active');
            if(pageId === 'upload') document.getElementById('nav-upload').classList.add('active');
            
            renderData();
        }

        // معالجة رفع الفورم
        function handleUpload(e) {
            e.preventDefault();
            const name = document.getElementById('mod-name').value;
            const desc = document.getElementById('mod-desc').value;
            const link = document.getElementById('mod-link').value;

            modsData.push({
                id: Date.now(),
                name,
                desc,
                link,
                status: "pending"
            });

            document.getElementById('upload-form').reset();
            renderData();
        }

        // موافقة الأونر على المود
        function approveMod(id) {
            const mod = modsData.find(m => m.id === id);
            if (mod) {
                mod.status = "approved";
                renderData();
            }
        }

        // رندر وعرض العناصر بالاستايل والـ Layout الأصلي تماماً
        function renderData() {
            const mainGrid = document.getElementById('main-mods-grid');
            const userList = document.getElementById('user-mods-list');
            const ownerList = document.getElementById('owner-review-list');

            // 1. الرئيسية (Approved المودات فقط)
            mainGrid.innerHTML = '';
            const approved = modsData.filter(m => m.status === 'approved');
            if(approved.length === 0) {
                mainGrid.innerHTML = '<div class="empty-state">لا توجد مودات معروضة حالياً للجميع.</div>';
            } else {
                approved.forEach(mod => {
                    mainGrid.innerHTML += `
                        <div class="mod-card">
                            <div class="mod-header">
                                <div class="mod-name">${mod.name}</div>
                            </div>
                            <div class="mod-desc">${mod.desc}</div>
                            <a href="${mod.link}" class="btn-download"><i data-lucide="download"></i> تحميل المود 📥</a>
                        </div>
                    `;
                });
            }

            // 2. قائمة المتابعة للرافع (تظهر حالة المود)
            userList.innerHTML = '';
            if(modsData.length === 0) {
                userList.innerHTML = '<div class="empty-state">لم تقم برفع أي ملفات.</div>';
            } else {
                modsData.forEach(mod => {
                    const isApp = mod.status === 'approved';
                    userList.innerHTML += `
                        <div class="item-row">
                            <div class="item-info">
                                <h4>${mod.name}</h4>
                                <p>رابط: ${mod.link}</p>
                            </div>
                            <span class="badge ${isApp ? 'badge-approved' : 'badge-pending'}">
                                ${isApp ? 'مقبول ونشر ✅' : 'تحت المراجعة ⏳'}
                            </span>
                        </div>
                    `;
                });
            }

            // 3. لوحة مراجعة الأونر (المودات الـ pending فقط للموافقة عليها)
            ownerList.innerHTML = '';
            const pending = modsData.filter(m => m.status === 'pending');
            if(pending.length === 0) {
                ownerList.innerHTML = '<div class="empty-state">لا توجد ملفات معلقة متبقية. 👌</div>';
            } else {
                pending.forEach(mod => {
                    ownerList.innerHTML += `
                        <div class="item-row">
                            <div class="item-info">
                                <h4>${mod.name}</h4>
                                <p style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${mod.desc}</p>
                            </div>
                            <button class="btn-approve" onclick="approveMod(${mod.id})">
                                <i data-lucide="check"></i> موافقة ونشر
                            </button>
                        </div>
                    `;
                });
            }

            // إعادة رسم أيقونات Lucide بعد كل رندر جديد للمكونات
            lucide.createIcons();
        }

        // تشغيل الرندر عند البداية وتثبيت الأيقونات
        window.onload = function() {
            renderData();
        };
    </script>
</body>
</html>
